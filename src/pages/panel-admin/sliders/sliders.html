<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدیریت اسلایدها | سالن سودا</title>
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="min-h-screen">
    <!-- منو همبرگری -->
    <header
      id="main-header"
      class="fixed top-0 right-0 left-0 h-14 bg-white border-b border-gray-200 z-[55] md:hidden flex items-center justify-start px-4"
    >
      <span id="menu-hamburger-btn" class="text-xl text-gray-600">☰</span>
    </header>

    <!-- سایدبار -->
    <nav
      id="sidebar-nav"
      class="fixed h-screen bg-white border-l border-gray-300 z-[60] shadow-[2px_0_15px_rgba(0,0,0,0.05)] top-0 right-0 transition-all duration-300 w-full md:w-[250px] hidden md:flex flex-col"
    >
      <div
        class="p-6 border-b border-gray-50 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <span
            class="w-3 h-3 rounded-full bg-[var(--color-primary-dark)]"
          ></span>
          <span class="text-lg font-bold text-[var(--color-primary-dark)]"
            >سالن زیبایی سودا</span
          >
        </div>
        <button id="menu-close-btn" class="md:hidden p-2 text-gray-400 text-xl">
          ✕
        </button>
      </div>

      <ul class="flex flex-col p-6 space-y-3 text-right list-none">
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../index.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            مقالات
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../portfolios/portfolios.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            نمونه کارها
          </a>
        </li>
        <li>
          <a
            class="no-underline nav-link-active flex items-center gap-2 p-3 rounded-[var(--radius-main)] bg-[var(--color-border)] transition-all font-medium"
            href="../sliders/sliders.html"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-[var(--color-primary-dark)]"
            ></span>
            اسلایدها
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../documents/documents.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            مدارک
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../reserves/reserves.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            رزروها
          </a>
        </li>
      </ul>
    </nav>

    <main class="pr-0 md:pr-[250px] p-6 md:p-8 pt-20">
      <header
        class="flex justify-between items-center mb-6 md:mb-8 max-w-5xl mx-auto px-4 md:px-0"
      >
        <h1
          class="text-lg md:text-2xl font-bold text-[var(--color-primary-dark)]"
        >
          مدیریت اسلایدها
        </h1>

        <button
          class="bg-[var(--color-primary-dark)] text-white px-3 py-2 md:px-5 md:py-2.5 rounded-[var(--radius-main)] text-sm md:text-base hover:opacity-90 transition-all"
        >
          + افزودن اسلاید
        </button>
      </header>

      <div
        id="sliders-container"
        class="flex flex-wrap justify-start gap-6 max-w-5xl mx-auto px-4 sm:px-0 w-full"
      >
        <!-- کارت های اسلایدر-->
        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <img
            src="../src/asserts/images/IMG_9931.jpeg"
            alt="تصویر اسلاید"
            class="w-full h-60 md:h-64 object-cover rounded-[16px]"
          />

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200"
          >
            حذف
          </button>
        </div>

        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <img
            src="../src/asserts/images/IMG_0393.jpeg"
            alt="تصویر اسلاید"
            class="w-full h-60 md:h-64 object-cover rounded-[16px]"
          />

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200"
          >
            حذف
          </button>
        </div>

        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <img
            src="../src/asserts/images/IMG_9931.jpeg"
            alt="تصویر اسلاید"
            class="w-full h-60 md:h-64 object-cover rounded-[16px]"
          />

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200"
          >
            حذف
          </button>
        </div>

        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <img
            src="../src/asserts/images/IMG_0393.jpeg"
            alt="تصویر اسلاید"
            class="w-full h-60 md:h-64 object-cover rounded-[16px]"
          />

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200"
          >
            حذف
          </button>
        </div>

        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <img
            src="../src/asserts/images/IMG_0393.jpeg"
            alt="تصویر اسلاید"
            class="w-full h-60 md:h-64 object-cover rounded-[16px]"
          />

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200"
          >
            حذف
          </button>
        </div>
      </div>
    </main>

    <div
      id="slider-modal"
      class="hidden fixed inset-0 bg-black/40 backdrop-blur-[2px] flex justify-center items-center z-50"
    >
      <div
        class="bg-white p-6 rounded-[24px] w-[90%] max-w-[400px] shadow-xl border border-gray-50"
      >
        <h2
          class="text-lg font-bold mb-5 text-gray-800 flex items-center gap-2"
        >
          <span
            class="w-1.5 h-4 bg-[var(--color-primary-dark)] rounded-full"
          ></span>
          افزودن اسلاید جدید
        </h2>

        <div class="mb-5">
          <label class="block text-xs font-semibold text-gray-500 mb-1.5"
            >انتخاب تصویر
          </label>
          <input
            id="slider-file-input"
            type="file"
            accept="image/*"
            class="w-full border border-gray-200 bg-gray-50 p-2 rounded-[var(--radius-main)] text-sm"
          />
        </div>

        <div class="flex justify-end gap-3">
          <button
            id="close-slider-modal"
            class="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-[var(--radius-main)]"
          >
            انصراف
          </button>
          <button
            id="save-slider-btn"
            class="px-5 py-2.5 bg-[var(--color-primary-dark)] text-white rounded-[var(--radius-main)]"
          >
            ذخیره اسلاید
          </button>
        </div>
      </div>
    </div>

    <script src="sliders.js"></script>
  </body>
</html>
