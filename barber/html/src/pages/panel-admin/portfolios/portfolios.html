<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مدیریت نمونه کارها | سالن زیبایی سودا</title>
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="min-h-screen">
    <!-- منو همبرگری -->
    <header
      id="main-header"
      class="fixed top-0 right-0 left-0 h-14 bg-white border-b border-gray-200 z-[55] md:hidden flex items-center justify-start px-4"
    >
      <span id="menu-hamburger-btn" class="text-xl text-gray-600">☰</span>
    </header>

    <!-- سایدبار -->
    <nav
      id="sidebar-nav"
      class="fixed h-screen bg-white border-l border-gray-300 z-[60] shadow-[2px_0_15px_rgba(0,0,0,0.05)] top-0 right-0 transition-all duration-300 w-full md:w-[250px] hidden md:flex flex-col"
    >
      <div
        class="p-6 border-b border-gray-50 flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <span
            class="w-3 h-3 rounded-full bg-[var(--color-primary-dark)]"
          ></span>
          <span class="text-lg font-bold text-[var(--color-primary-dark)]"
            >سالن زیبایی سودا</span
          >
        </div>
        <!-- دکمه بستن (فقط در موبایل) -->
        <button id="menu-close-btn" class="md:hidden p-2 text-gray-400 text-xl">
          ✕
        </button>
      </div>

      <ul class="flex flex-col p-6 space-y-3 text-right list-none">
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../index.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            مقالات
          </a>
        </li>
        <li>
          <a
            class="no-underline nav-link-active flex items-center gap-2 p-3 rounded-[var(--radius-main)] bg-[var(--color-border)] transition-all font-medium"
            href="../portfolios/portfolios.html"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-[var(--color-primary-dark)]"
            ></span>
            نمونه کارها
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../sliders/sliders.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            اسلایدها
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../documents/documents.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            مدارک
          </a>
        </li>
        <li>
          <a
            class="no-underline text-gray-500 hover:text-[var(--color-primary-dark)] flex items-center gap-2 p-3 rounded-[var(--radius-main)] hover:bg-[var(--color-border)] transition-all"
            href="../reserves/reserves.html"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
            رزروها
          </a>
        </li>
      </ul>
    </nav>

    <main class="pr-0 md:pr-[250px] p-6 md:p-8 pt-20">
      <header
        class="flex justify-between items-center mb-6 md:mb-8 max-w-5xl mx-auto px-4 md:px-0"
      >
        <h1
          class="text-lg md:text-2xl font-bold text-[#5B6B46] ml-auto pr-4 md:pr-0 md:ml-0"
        >
          مدیریت نمونه کارها
        </h1>
        <button
          id="open-portfolio-modal"
          class="bg-[#5B6B46] text-white px-3 py-2 md:px-5 md:py-2.5 rounded-[12px] text-sm md:text-base hover:opacity-90 transition-all"
        >
          + افزودن نمونه کار
        </button>
      </header>

      <div
        id="portfolio-container"
        class="flex flex-wrap justify-start gap-6 max-w-5xl mx-auto px-4 sm:px-0 w-full"
      >
        <!-- کارت نمونه کارها -->
        <!-- کارت نمونه (قبل و بعد) -->
        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <div class="flex gap-2">
            <div class="w-1/2 relative bg-gray-50 rounded-[16px]">
              <span
                class="absolute top-1 right-1 bg-black/60 text-white text-xs px-2 rounded z-10"
                >قبل</span
              >
              <img
                src="../src/asserts/images/IMG_0393.jpeg"
                class="w-full h-40 md:h-64 object-contain rounded-[16px]"
              />
            </div>

            <div class="w-1/2 relative bg-gray-50 rounded-[16px]">
              <span
                class="absolute top-1 right-1 bg-[#5B6B46] text-white text-xs px-2 rounded z-10"
                >بعد</span
              >
              <img
                src="../src/asserts/images/IMG_9523.jpeg"
                class="w-full h-40 md:h-64 object-contain rounded-[16px]"
              />
            </div>
          </div>

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200 z-20"
          >
            حذف
          </button>
        </div>

        <!-- کارت نمونه (فقط بعد) -->
        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <div class="w-full relative bg-gray-50 rounded-[16px]">
            <span
              class="absolute top-1 right-1 bg-[#5B6B46] text-white text-xs px-2 rounded z-10"
              >بعد</span
            >
            <img
              src="../src/asserts/images/IMG_0393.jpeg"
              class="w-full h-40 md:h-64 object-contain rounded-[16px]"
            />
          </div>

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200 z-20"
          >
            حذف
          </button>
        </div>

        <!-- کارت نمونه (قبل و بعد) -->
        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <div class="flex gap-2">
            <div class="w-1/2 relative bg-gray-50 rounded-[16px]">
              <span
                class="absolute top-1 right-1 bg-black/60 text-white text-xs px-2 rounded z-10"
                >قبل</span
              >
              <img
                src="../src/asserts/images/IMG_9931.jpeg"
                class="w-full h-40 md:h-64 object-contain rounded-[16px]"
              />
            </div>

            <div class="w-1/2 relative bg-gray-50 rounded-[16px]">
              <span
                class="absolute top-1 right-1 bg-[#5B6B46] text-white text-xs px-2 rounded z-10"
                >بعد</span
              >
              <img
                src="../src/asserts/images/IMG_9523.jpeg"
                class="w-full h-40 md:h-64 object-contain rounded-[16px]"
              />
            </div>
          </div>

          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200 z-20"
          >
            حذف
          </button>
        </div>

         <!-- کارت نمونه (فقط بعد)  -->
        <div
          class="bg-white p-3 rounded-[24px] shadow-sm border border-gray-100 relative group w-full max-w-[320px] dir='rtl'"
        >
          <div class="w-full relative bg-gray-50 rounded-[16px]">
            <span
              class="absolute top-1 right-1 bg-[#5B6B46] text-white text-xs px-2 rounded z-10"
              >بعد</span
            >
            <img
              src="../src/asserts/images/IMG_9523.jpeg"
              class="w-full h-40 md:h-64 object-contain rounded-[16px]"
            />
          </div>

          <!-- دکمه حذف -->
          <button
            class="delete-btn absolute top-6 left-6 bg-white px-3 py-1 rounded-full text-red-500 shadow-md text-xs font-bold hover:bg-red-50 transition-all duration-200 z-20"
          >
            حذف
          </button>
        </div>
      </div>
    </main>

    <!-- مدال افزودن نمونه کار -->
    <div
      id="portfolio-modal"
      class="hidden fixed inset-0 bg-black/40 backdrop-blur-[2px] flex justify-center items-center z-50"
    >
      <div
        class="bg-white p-6 rounded-[24px] w-[90%] max-w-[450px] shadow-xl border border-gray-50"
      >
        <h2
          class="text-lg font-bold mb-5 text-gray-800 flex items-center gap-2"
        >
          <span class="w-1.5 h-4 bg-[#5B6B46] rounded-full"></span> افزودن نمونه
          کار جدید
        </h2>
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5"
              >عکس قبل (اختیاری)</label
            >
            <input
              id="before-file-input"
              type="file"
              accept="image/*"
              class="w-full border border-gray-200 bg-gray-50 p-2 rounded-[12px] text-sm"
            />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5"
              >عکس بعد</label
            >
            <input
              id="after-file-input"
              type="file"
              accept="image/*"
              required
              class="w-full border border-gray-200 bg-gray-50 p-2 rounded-[12px] text-sm"
            />
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button
            id="close-portfolio-modal"
            class="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-[12px]"
          >
            انصراف
          </button>
          <button
            id="save-portfolio-btn"
            class="px-5 py-2.5 bg-[#5B6B46] text-white rounded-[12px]"
          >
            ذخیره نمونه کار
          </button>
        </div>
      </div>
    </div>

    <script src="portfolios.js"></script>
  </body>
</html>
